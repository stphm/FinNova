services:
  php:
    build:
      context: .
    container_name: finnova_php
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: finnova_db
    environment:
      POSTGRES_DB: finnova
      POSTGRES_USER: u_finnova
      POSTGRES_PASSWORD: pwd_finnova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
